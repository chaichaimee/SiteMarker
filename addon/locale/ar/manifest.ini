summary = "SiteMarker"
description = """إدارة جميع المواقع والعلامات من مدير مركزي - إضافة، تعديل، حذف، أو مسح العلامات، مع دعم لجميع المتصفحات الرئيسية، وتطبيقات الصفحة الواحدة (SPAs)، واليونيكود، ومشاركة ملفات JSON المحمولة
Hot Keys:
Windows+F12
ضغطة واحدة : إضافة أو تعديل علامة
ضغطتان : فتح مدير المواقع
ثلاث ضغطات : فتح مدير العلامات"""