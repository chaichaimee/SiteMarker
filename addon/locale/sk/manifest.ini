summary = "SiteMarker"
description = """Správa všetkých webov a značiek z centrálneho správcu - pridávanie, úprava, mazanie alebo vymazanie značiek, s podporou všetkých hlavných prehliadačov, SPA, Unicode a prenosného zdieľania JSON
Hot Keys:
Windows+F12
Jedno stlačenie : Pridať alebo upraviť značku
Dvojité stlačenie : Otvoriť správcu webov
Trojité stlačenie : Otvoriť správcu značiek"""