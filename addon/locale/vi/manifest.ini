summary = "SiteMarker"
description = """Quản lý tất cả các trang web và điểm đánh dấu từ một trình quản lý trung tâm  thêm, chỉnh sửa, xóa hoặc xóa sạch điểm đánh dấu, hỗ trợ tất cả các trình duyệt chính, SPA, Unicode và chia sẻ JSON di động
Phím tắt:
Windows+F12
Chạm đơn: Thêm hoặc chỉnh sửa điểm đánh dấu
Chạm đúp: Mở Trình quản lý trang web"""