summary = "SiteMarker"
description = """Quản lý tất cả các trang web và dấu đánh dấu từ một trình quản lý trung tâm - thêm, sửa, xóa hoặc xóa dấu đánh dấu, hỗ trợ tất cả các trình duyệt lớn, SPA, Unicode và chia sẻ JSON di động
Hot Keys:
Windows+F12
Nhấn một lần : Thêm hoặc Sửa dấu đánh dấu
Nhấn hai lần : Mở Trình quản lý trang web
Nhấn ba lần : Mở Trình quản lý dấu đánh dấu"""