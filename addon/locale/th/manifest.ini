summary = "SiteMarker"
description = """จัดการทุกเว็บไซต์และมาร์กเกอร์จากตัวจัดการส่วนกลาง - เพิ่ม แก้ไข ลบ หรือล้างมาร์กเกอร์ พร้อมรองรับเบราว์เซอร์หลักทั้งหมด, SPA, Unicode และการแชร์ JSON แบบพกพา
Hot Keys:
Windows+F12
กดครั้งเดียว : เพิ่มหรือแก้ไขมาร์กเกอร์
กดสองครั้ง : เปิดตัวจัดการเว็บไซต์
กดสามครั้ง : เปิดตัวจัดการมาร์กเกอร์"""