summary = "SiteMarker"
description = """Verwalten Sie alle Websites und Marker über einen zentralen Manager – Hinzufügen, Bearbeiten, Löschen oder Leeren von Markern, mit Unterstützung für alle gängigen Browser, SPAs, Unicode und portablen JSON-Austausch
Hot Keys:
Windows+F12
Einmaliges Drücken : Marker hinzufügen oder bearbeiten
Zweimaliges Drücken : Webseiten-Manager öffnen
Dreimaliges Drücken : Marker-Manager öffnen"""