summary = "SiteMarker"
description = """ဗဟိုမန်နေဂျာမှ ဝဘ်ဆိုဒ်များနှင့် မာကုများအားလုံးကို စီမံခန့်ခွဲပါ - မာကုများ ထည့်ခြင်း၊ ပြင်ဆင်ခြင်း၊ ဖျက်ခြင်း သို့မဟုတ် ရှင်းလင်းခြင်း၊ အဓိက ဘရောက်ဇာအားလုံး၊ SPAs၊ ယူနီကုဒ်နှင့် သယ်ဆောင်ရလွယ်ကူသော JSON မျှဝေခြင်းတို့ကို ပံ့ပိုးပေးသည်
Hot Keys:
Windows+F12
တစ်ချက်နှိပ်ရုံ : မာကုထည့်ရန် သို့မဟုတ် ပြင်ဆင်ရန်
နှစ်ချက်နှိပ်ရုံ : ဝဘ်ဆိုဒ်မန်နေဂျာကို ဖွင့်ပါ
သုံးချက်နှိပ်ရုံ : မာကုမန်နေဂျာကို ဖွင့်ပါ"""