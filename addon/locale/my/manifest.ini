summary = "SiteMarker"
description = """ဗဟိုမန်နေဂျာမှ ဝဘ်ဆိုက်များနှင့် မာကာအားလုံးကို စီမံခန့်ခွဲပါ - မာကာများကို ထည့်သွင်းခြင်း၊ တည်းဖြတ်ခြင်း၊ ဖျက်ခြင်း သို့မဟုတ် ရှင်းလင်းခြင်း၊ အဓိက ဘရောက်ဆာများ၊ SPA၊ ယူနီကုဒ်နှင့် JSON မျှဝေခြင်းတို့ကို ပံ့ပိုးပေးသည်
Hot Keys:
Windows+F12
Single Tap: မာကာ ထည့်သွင်းရန် သို့မဟုတ် တည်းဖြတ်ရန်
Double Tap: ဆိုက်မန်နေဂျာကို ဖွင့်ရန်"""