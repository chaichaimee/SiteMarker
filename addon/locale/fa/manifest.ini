summary = "SiteMarker"
description = """مدیریت تمام سایت‌ها و نشانه‌ها از یک مدیر مرکزی - افزودن، ویرایش، حذف یا پاک کردن نشانه‌ها، با پشتیبانی از تمام مرورگرهای اصلی، SPAها، یونیکد و اشتراک‌گذاری قابل حمل JSON
Hot Keys:
Windows+F12
یک بار فشردن : افزودن یا ویرایش نشانه
دو بار فشردن : باز کردن مدیریت سایت‌ها
سه بار فشردن : باز کردن مدیریت نشانه‌ها"""