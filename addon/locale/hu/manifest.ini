summary = "SiteMarker"
description = """Kezelje az összes webhelyet és jelölőt egy központi kezelőből - jelölők hozzáadása, szerkesztése, törlése vagy törlése, az összes jelentősebb böngésző, SPA, Unicode és hordozható JSON-megosztás támogatásával
Hot Keys:
Windows+F12
Egy gombnyomás : Jelölő hozzáadása vagy szerkesztése
Dupla gombnyomás : Webhelykezelő megnyitása
Tripla gombnyomás : Jelölőkezelő megnyitása"""