summary = "SiteMarker"
description = """एक केंद्रीय प्रबंधक से सभी साइटों और मार्करों को प्रबंधित करें - मार्करों को जोड़ें, संपादित करें, हटाएं या साफ़ करें, सभी प्रमुख ब्राउज़रों, SPAs, यूनिकोड और पोर्टेबल JSON साझाकरण के समर्थन के साथ
Hot Keys:
Windows+F12
एक बार दबाएं : मार्कर जोड़ें या संपादित करें
दो बार दबाएं : साइट प्रबंधक खोलें
तीन बार दबाएं : मार्कर प्रबंधक खोलें"""