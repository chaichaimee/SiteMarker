summary = "SiteMarker"
description = """Управление на всички сайтове и маркери от централен мениджър - добавяне, редактиране, изтриване или изчистване на маркери, с поддръжка на всички основни браузъри, SPA, Unicode и преносимо споделяне на JSON
Hot Keys:
Windows+F12
Единично натискане : Добавяне или редактиране на маркер
Двойно натискане : Отваряне на мениджъра на сайтове
Тройно натискане : Отваряне на мениджъра на маркери"""