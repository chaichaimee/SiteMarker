summary = "SiteMarker"
description = """Управление всеми сайтами и маркерами из центрального менеджера — добавление, редактирование, удаление или очистка маркеров с поддержкой всех основных браузеров, SPA, Unicode и портативного обмена файлами JSON
Hot Keys:
Windows+F12
Одно нажатие : добавить или изменить маркер
Двойное нажатие : открыть диспетчер сайтов
Тройное нажатие : открыть диспетчер маркеров"""