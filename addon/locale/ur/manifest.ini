summary = "SiteMarker"
description = """تمام سائٹس اور مارکرز को एक مرکزی مینیجر سے منظم کریں - تمام بڑے براؤзرز، SPAs، یونیکوڈ، اور پورٹیبل JSON شیئرنگ کے تعاون کے ساتھ مارکر شامل کریں، ترمیم کریں، حذف کریں یا صاف کریں
