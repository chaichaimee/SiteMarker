summary = "SiteMarker"
description = """تمام سائٹس اور مارکرز کو ایک مرکزی مینیجر سے منظم کریں - مارکرز کو شامل کریں، ترمیم کریں، حذف کریں یا صاف کریں، تمام اہم براؤزرز، SPA، یونیکوڈ اور پورٹیبل JSON شیئرنگ کے تعاون کے ساتھ
ہاٹ کیز:
