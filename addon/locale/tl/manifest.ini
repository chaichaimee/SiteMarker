summary = "SiteMarker"
description = """Pamahalaan ang lahat ng mga site at marker mula sa isang central manager  magdagdag, mag-edit, magbura, o mag-clear ng mga marker, na may suporta para sa lahat ng pangunahing browser, SPA, Unicode, at portable JSON sharing
Hot Keys:
Windows+F12
Single Tap: Magdagdag o mag-edit ng marker
Double Tap: Buksan ang Site Manager"""