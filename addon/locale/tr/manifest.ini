summary = "SiteMarker"
description = """Tüm siteleri ve işaretçileri merkezi bir yöneticiden yönetin - tüm büyük tarayıcılar, SPA'lar, Unicode ve taşınabilir JSON paylaşımı desteğiyle işaretçiler ekleyin, düzenleyin, silin veya temizleyin
Hot Keys:
Windows+F12
Tek Dokunuş : İşaretçi Ekle veya Düzenle
Çift Dokunuş : Site Yöneticisini Aç
Üç Dokunuş : İşaretçi Yöneticisini Aç"""