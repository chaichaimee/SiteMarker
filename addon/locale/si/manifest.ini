summary = "SiteMarker"
description = """මධ්‍යම කළමනාකරුවෙකුගෙන් සියලුම වෙබ් අඩවි සහ සලකුණු කළමනාකරණය කරන්න - සියලුම ප්‍රධාන බ්‍රව්සර්, SPAs, යුනිකෝඩ් සහ අතේ ගෙන යා හැකි JSON බෙදාගැනීමේ සහාය ඇතිව සලකුණු එකතු කරන්න, සංස්කරණය කරන්න, මකන්න හෝ ඉවත් කරන්න
Hot Keys:
Windows+F12
