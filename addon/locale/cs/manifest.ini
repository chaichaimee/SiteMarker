summary = "SiteMarker"
description = """Správa všech webů a značek z centrálního správce - přidávání, úprava, mazání nebo mazání značek, s podporou všech hlavních prohlížečů, SPA, Unicode a přenosného sdílení JSON
Hot Keys:
Windows+F12
Jedno stisknutí : Přidat nebo upravit značku
Dvojité stisknutí : Otevřít správce webů
Trojité stisknutí : Otevřít správce značek"""